steps:
  - name: check URLs
    module: processors/url_check
    module_options:
      source_directories:
        - software
        - tags
      source_files:
        - licenses.yml
      errors_are_fatal: True
      exclude_regex:
        - '^https://github.com/[\w\.\-]+/[\w\.\-]+$' # don't check URLs that will be processed by the software_metadata module
        - '^https://gitlab.com/[\w\.\-]+/[\w\.\-]+$' # don't check URLs that will be processed by the software_metadata module
        - '^https://git.whamcloud.com/$' # Cloudflare DDos protection page, always returns 403
        - '^https://community.openvpn.net/$' # Cloudflare DDos protection page, always returns 403
