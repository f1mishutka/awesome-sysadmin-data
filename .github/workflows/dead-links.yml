name: dead links

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: dead-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-dead-links:
    if: github.repository == 'awesome-foss/awesome-sysadmin-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - run: make install
      - run: make url_check
